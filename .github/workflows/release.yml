name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: GyaimSwift
        run: xcodegen generate

      - name: Run tests
        working-directory: GyaimSwift
        run: ./Scripts/run-unit-tests.sh

      # Release build + pkg-in-DMG packaging, matching README and
      # docs/release-packaging.md (the raw-.app Debug DMG had drifted from
      # the documented install flow — issue #61). Signing / notarization is
      # still manual; see docs/release-packaging.md.
      - name: Build installer DMG (Release, pkg inside)
        working-directory: GyaimSwift
        run: ./Scripts/build-dmg.sh

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            GyaimSwift/dist/dmg/*.dmg \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
